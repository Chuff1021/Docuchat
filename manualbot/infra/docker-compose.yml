version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: manualbot-postgres
    environment:
      POSTGRES_USER: manualbot
      POSTGRES_PASSWORD: manualbot
      POSTGRES_DB: manualbot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manualbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: manualbot-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: manualbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

  # ─── Backend API ──────────────────────────────────────────────────────────

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: manualbot-api
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://manualbot:manualbot@postgres:5432/manualbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/uploads
      DEBUG: "true"
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      sh -c "
        alembic upgrade head &&
        python seed.py &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ─── Celery Worker ────────────────────────────────────────────────────────

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: manualbot-worker
    env_file:
      - ../apps/api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://manualbot:manualbot@postgres:5432/manualbot
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      QDRANT_URL: http://qdrant:6333
      STORAGE_BACKEND: local
      LOCAL_STORAGE_PATH: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info -Q ingestion,default --concurrency=2

  # ─── Frontend ─────────────────────────────────────────────────────────────

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: manualbot-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WIDGET_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  uploads_data:
